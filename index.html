<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iPhone UI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 웹 전체 배경 -->
<div class="page-bg"></div>

<!-- 아이폰 -->
<main class="phone">

<!-- 다이나믹 아일랜드 -->
<div class="dynamic-island"></div>

<!-- 상태바 -->
<header class="statusbar">

<div class="status-left" id="status-time">00:00</div>

<div class="status-right">

<span class="signal">
<i></i><i></i><i></i><i></i>
</span>

<span class="wifi">
<span class="wifi-dot"></span>
</span>

<span class="battery">
<span class="battery-level"></span>
</span>

</div>

</header>


<!-- ============================= -->
<!-- 잠금화면 -->
<!-- ============================= -->

<section class="screen lock-screen active" id="lockScreen">

<div class="wallpaper wallpaper-lock"></div>
<div class="lock-overlay-top"></div>

<div class="lock-content">

<div class="lock-icon"></div>

<div class="lock-date" id="lockDate">
3월 15일 일요일
</div>

<div class="lock-time" id="lockTime">
00:00
</div>

</div>

<div class="swipe-up-area">
<div class="swipe-up-text">
위로 쓸어올려 열기
</div>
</div>

<div class="lock-bottom-actions">

<button class="round-action flashlight"></button>
<button class="round-action camera"></button>

</div>

<div class="home-indicator"></div>

</section>



<!-- ============================= -->
<!-- 암호 입력 -->
<!-- ============================= -->

<section class="screen passcode-screen" id="passcodeScreen">

<div class="wallpaper wallpaper-passcode"></div>
<div class="passcode-blur"></div>
<div class="lock-overlay-top"></div>


<div class="passcode-wrap" id="passcodeWrap">

<div class="lock-icon passcode-lock"></div>

<h1 class="passcode-title">
암호 입력
</h1>


<!-- 점 -->
<div class="passcode-dots">

<span class="passcode-dot" id="dot1"></span>
<span class="passcode-dot" id="dot2"></span>
<span class="passcode-dot" id="dot3"></span>
<span class="passcode-dot" id="dot4"></span>

</div>



<!-- 숫자 키패드 -->

<div class="keypad">

<button class="key key-number" onclick="pressKey('1')">
<span class="num">1</span>
</button>

<button class="key key-number" onclick="pressKey('2')">
<span class="num">2</span>
<span class="letters">ABC</span>
</button>

<button class="key key-number" onclick="pressKey('3')">
<span class="num">3</span>
<span class="letters">DEF</span>
</button>

<button class="key key-number" onclick="pressKey('4')">
<span class="num">4</span>
<span class="letters">GHI</span>
</button>

<button class="key key-number" onclick="pressKey('5')">
<span class="num">5</span>
<span class="letters">JKL</span>
</button>

<button class="key key-number" onclick="pressKey('6')">
<span class="num">6</span>
<span class="letters">MNO</span>
</button>

<button class="key key-number" onclick="pressKey('7')">
<span class="num">7</span>
<span class="letters">PQRS</span>
</button>

<button class="key key-number" onclick="pressKey('8')">
<span class="num">8</span>
<span class="letters">TUV</span>
</button>

<button class="key key-number" onclick="pressKey('9')">
<span class="num">9</span>
<span class="letters">WXYZ</span>
</button>

<div class="key-empty"></div>

<button class="key key-number" onclick="pressKey('0')">
<span class="num">0</span>
</button>

<div class="key-empty"></div>

</div>

</div>

<div class="home-indicator"></div>

</section>




<!-- ============================= -->
<!-- 홈화면 -->
<!-- ============================= -->

<section class="screen home-screen" id="homeScreen">

<div class="wallpaper wallpaper-home"></div>


<div class="home-apps">

<!-- 1줄 -->

<button class="app-icon dummy-app">
<img src="assets/icons/settings.png">
<span>설정</span>
</button>

<button class="app-icon dummy-app">
<img src="assets/icons/files.png">
<span>파일</span>
</button>

<button class="app-icon open-app" data-screen="memoScreen">
<img src="assets/icons/memo.png">
<span>메모</span>
</button>

<button class="app-icon open-app" data-screen="calendarScreen">
<img src="assets/icons/calendar.png">
<span>캘린더</span>
</button>


<!-- 2줄 -->

<button class="app-icon popup-app" data-popup="weather">
<img src="assets/icons/weather.png">
<span>날씨</span>
</button>

<button class="app-icon dummy-app">
<img src="assets/icons/calculator.png">
<span>계산기</span>
</button>

<button class="app-icon dummy-app">
<img src="assets/icons/camera.png">
<span>카메라</span>
</button>

<button class="app-icon open-app" data-screen="photosScreen">
<img src="assets/icons/photos.png">
<span>사진</span>
</button>



<!-- 3줄 -->

<button class="app-icon dummy-app">
<img src="assets/icons/clock.png">
<span>시계</span>
</button>

<button class="app-icon dummy-app">
<img src="assets/icons/kakaomap.png">
<span>카카오맵</span>
</button>

<button class="app-icon popup-app" data-popup="youtube">
<img src="assets/icons/youtube.png">
<span>YouTube</span>
</button>

<button class="app-icon open-app" data-screen="instagramScreen">
<img src="assets/icons/instagram.png">
<span>Instagram</span>
</button>



<!-- 4줄 -->

<button class="app-icon dummy-app">
<img src="assets/icons/appstore.png">
<span>App Store</span>
</button>

<button class="app-icon popup-app" data-popup="melon">
<img src="assets/icons/melon.png">
<span>Melon</span>
</button>

<button class="app-icon popup-app" data-popup="x">
<img src="assets/icons/x.png">
<span>X</span>
</button>

<div class="app-empty"></div>



<!-- 5줄 -->

<div class="app-empty"></div>
<div class="app-empty"></div>
<div class="app-empty"></div>
<div class="app-empty"></div>


<!-- 6줄 -->

<div class="app-empty"></div>
<div class="app-empty"></div>
<div class="app-empty"></div>
<div class="app-empty"></div>

</div>



<!-- Dock -->

<div class="dock">

<button class="dock-icon open-app" data-screen="phoneScreen">
<img src="assets/icons/phone.png">
</button>

<button class="dock-icon open-app" data-screen="messagesScreen">
<img src="assets/icons/messages.png">
</button>

<button class="dock-icon open-app" data-screen="kakaoScreen">
<img src="assets/icons/kakaotalk.png">
</button>

<button class="dock-icon popup-app" data-popup="music">
<img src="assets/icons/music.png">
</button>

</div>

</section>



</main>



<!-- JS -->

<script src="script.js"></script>

</body>
</html>

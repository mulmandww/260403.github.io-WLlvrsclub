<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>iPhone UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg"></div>

  <main class="phone" aria-label="iPhone simulator">
    <div class="dynamic-island"></div>

    <header class="statusbar">
      <div class="status-left">SKT</div>

      <div class="status-right">
        <span class="signal" aria-hidden="true">
          <i></i><i></i><i></i><i></i>
        </span>
        <span class="wifi" aria-hidden="true"></span>
        <span class="battery" aria-hidden="true">
          <span class="battery-level"></span>
        </span>
      </div>
    </header>

    <!-- 잠금화면 -->
    <section class="screen lock-screen active" id="lockScreen">
      <div class="wallpaper wallpaper-lock"></div>
      <div class="lock-overlay-top"></div>

      <div class="lock-content">
        <div class="lock-icon" aria-hidden="true"></div>
        <div class="lock-date" id="lockDate">3월 15일 일요일</div>
        <div class="lock-time" id="lockTime">18:56</div>
      </div>

      <div class="swipe-up-area" id="swipeUpArea" aria-label="위로 쓸어올려 열기">
        <div class="swipe-up-text">위로 쓸어올려 열기</div>
        <div class="swipe-handle"></div>
      </div>

      <div class="lock-bottom-actions">
        <button class="round-action flashlight" type="button" aria-label="손전등"></button>
        <button class="round-action camera" type="button" aria-label="카메라"></button>
      </div>

      <div class="home-indicator"></div>
    </section>

    <!-- 암호 입력 -->
    <section class="screen passcode-screen" id="passcodeScreen">
      <div class="wallpaper wallpaper-passcode"></div>
      <div class="passcode-blur"></div>
      <div class="lock-overlay-top"></div>

      <div class="passcode-wrap" id="passcodeWrap">
        <div class="lock-icon passcode-lock" aria-hidden="true"></div>

        <h1 class="passcode-title">암호 입력</h1>

        <div class="passcode-dots">
          <span class="passcode-dot" id="dot1"></span>
          <span class="passcode-dot" id="dot2"></span>
          <span class="passcode-dot" id="dot3"></span>
          <span class="passcode-dot" id="dot4"></span>
        </div>

        <div class="keypad">
          <button class="key key-number" type="button" onclick="pressKey('1')">
            <span class="num">1</span>
          </button>

          <button class="key key-number" type="button" onclick="pressKey('2')">
            <span class="num">2</span>
            <span class="letters">ABC</span>
          </button>

          <button class="key key-number" type="button" onclick="pressKey('3')">
            <span class="num">3</span>
            <span class="letters">DEF</span>
          </button>

          <button class="key key-number" type="button" onclick="pressKey('4')">
            <span class="num">4</span>
            <span class="letters">GHI</span>
          </button>

          <button class="key key-number" type="button" onclick="pressKey('5')">
            <span class="num">5</span>
            <span class="letters">JKL</span>
          </button>

          <button class="key key-number" type="button" onclick="pressKey('6')">
            <span class="num">6</span>
            <span class="letters">MNO</span>
          </button>

          <button class="key key-number" type="button" onclick="pressKey('7')">
            <span class="num">7</span>
            <span class="letters">PQRS</span>
          </button>

          <button class="key key-number" type="button" onclick="pressKey('8')">
            <span class="num">8</span>
            <span class="letters">TUV</span>
          </button>

          <button class="key key-number" type="button" onclick="pressKey('9')">
            <span class="num">9</span>
            <span class="letters">WXYZ</span>
          </button>

          <button class="text-action emergency" type="button">긴급상황</button>

          <button class="key key-number" type="button" onclick="pressKey('0')">
            <span class="num">0</span>
          </button>

          <button class="text-action cancel" type="button" onclick="deleteKey()">취소</button>
        </div>
      </div>

      <div class="home-indicator"></div>
    </section>

    <!-- 홈화면 -->
    <section class="screen home-screen" id="homeScreen">
      <div class="wallpaper wallpaper-home"></div>

      <div class="home-apps">
        <button class="app-icon" type="button">
          <img src="assets/icons/messages.png" alt="Messages" />
          <span>Messages</span>
        </button>

        <button class="app-icon" type="button">
          <img src="assets/icons/photos.png" alt="Photos" />
          <span>Photos</span>
        </button>

        <button class="app-icon" type="button">
          <img src="assets/icons/instagram.png" alt="Instagram" />
          <span>Instagram</span>
        </button>

        <button class="app-icon" type="button">
          <img src="assets/icons/memo.png" alt="Memo" />
          <span>Memo</span>
        </button>

        <button class="app-icon" type="button">
          <img src="assets/icons/messages.png" alt="Calendar" />
          <span>Calendar</span>
        </button>

        <button class="app-icon" type="button">
          <img src="assets/icons/photos.png" alt="Gallery" />
          <span>Gallery</span>
        </button>

        <button class="app-icon" type="button">
          <img src="assets/icons/instagram.png" alt="Notes" />
          <span>Notes</span>
        </button>

        <button class="app-icon" type="button">
          <img src="assets/icons/memo.png" alt="Files" />
          <span>Files</span>
        </button>
      </div>

      <div class="dock">
        <button class="dock-icon" type="button">
          <img src="assets/icons/messages.png" alt="Phone" />
        </button>
        <button class="dock-icon" type="button">
          <img src="assets/icons/photos.png" alt="Safari" />
        </button>
        <button class="dock-icon" type="button">
          <img src="assets/icons/instagram.png" alt="Music" />
        </button>
        <button class="dock-icon" type="button">
          <img src="assets/icons/memo.png" alt="Settings" />
        </button>
      </div>

      <div class="home-indicator"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

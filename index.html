<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Geonwoo의 iPhone</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">

    <!-- 잠금화면 -->
    <div class="lockscreen">
        <div class="time">09:41</div>
        <div class="unlock">Tap to unlock</div>
    </div>

    <!-- 홈 화면 -->
    <div class="homescreen">

        <div class="statusbar">
            <span>09:41</span>
            <span>📶 🔋</span>
        </div>

        <div class="apps">

            <div class="app" onclick="openApp('messages')">💬<p>Messages</p></div>
            <div class="app" onclick="openApp('gallery')">📷<p>Gallery</p></div>
            <div class="app" onclick="openApp('instagram')">📸<p>Instagram</p></div>
            <div class="app" onclick="openApp('calendar')">📅<p>Calendar</p></div>
            <div class="app" onclick="openApp('memo')">📝<p>Memo</p></div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
